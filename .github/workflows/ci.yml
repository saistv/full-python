name: CI

# Closes principal-audit P2-3 (no CI). Runs the offline suite exactly as a
# fresh operator machine would: no market data, no credentials, no network
# fixtures. Operator-data tests skip themselves without FULL_PYTHON_BASELINE_DATA /
# FULL_PYTHON_TV_EXPORT, so a green run here is the offline executable spec,
# not broker or TV parity evidence (HANDOFF §4).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  offline-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # 3.9 is the operator floor (guardrailed; the local machine runs 3.9.6).
        # 3.12 guards against silent forward-compat rot in the stdlib-only code.
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test runner
        run: python -m pip install -e ".[dev]"
      - name: Run offline suite
        run: python -m pytest -q

  # Review 2026-07-19 P2-2: a parity-breaking strategy change could merge
  # green because every anchor/parity assertion was operator-machine-only
  # (proven by the review's mutation experiment). This job runs the five
  # evidence files -- current-engine golden-anchor replay, sim/live
  # identity, session-report signals, sizing identity, and the 106/106
  # TradingView reconciliation -- against committed fixtures on every push
  # and PR. The review's exact mutation now turns this job red.
  anchor-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FULL_PYTHON_BASELINE_DATA: tests/data/nq1_2025-10-01_2026-06-26.csv
      FULL_PYTHON_TV_EXPORT: tests/data/tv_export_am_dll_2026-07-03.csv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install package and test runner
        run: python -m pip install -e ".[dev]"
      - name: Run anchor and parity evidence
        run: >
          python -m pytest -q
          tests/test_golden_trades.py
          tests/test_live_loop_identity.py
          tests/test_live_session_report.py
          tests/test_sizing_candidates.py
          tests/test_tv_reconciliation.py
